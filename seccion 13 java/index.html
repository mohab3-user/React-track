    <button id="changePhoto">next</button>
    <img  src="photos/business-main-700x680.jpg">
    
    <script>
        var btn = document.querySelector("#changePhoto");
        var photo = document.querySelector("#photo");
        btn.onclick = function() {
            if(photo.src === "photos/business-2.jpg") {
                photo.src = "photos/business-main-700x680.jpg";
            } else {
                photo.src = "photos/business-2.jpg";
            }
        }
    </script>
