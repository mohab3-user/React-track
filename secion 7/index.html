<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel Rooms</title>

  <link rel="stylesheet" href="main.css" />

  
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    integrity="sha512-pM9w3P2UsI6Fyun3jyWeT0IpNh86pO2pCSPYlQ7d/vDcr+uYqPif9y0XnYf20X1pAXu/pC9FN+X7VIF4sPZf0A=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
</head>
<body>

  <!-- ===== ROOMS SECTION ===== -->
  <section class="container">
    <div class="container__inner">

      <div class="container-card">
        <div class="img-wrap">
          <img src="room1.jpg.webp" alt="Double Deluxe Room">
          <button class="book-btn">BOOK NOW</button>
        </div>
        <h3>Double Deluxe Room</h3>
        <p class="price">$250<span>/night</span></p>
      </div>

      <div class="container-card">
        <div class="img-wrap">
          <img src="room2.jpg.webp" alt="Single Deluxe Room">
          <button class="book-btn">BOOK NOW</button>
        </div>
        <h3>Single Deluxe Room</h3>
        <p class="price">$200<span>/night</span></p>
      </div>

      <div class="container-card">
        <div class="img-wrap">
          <img src="room3.jpg.webp" alt="Honeymoon Suite">
          <button class="book-btn">BOOK NOW</button>
        </div>
        <h3>Honeymoon Suite</h3>
        <p class="price">$750<span>/night</span></p>
      </div>

      <div class="container-card">
        <div class="img-wrap">
          <img src="room4.jpg.webp" alt="Economy Double">
          <button class="book-btn">BOOK NOW</button>
        </div>
        <h3>Economy Double Room</h3>
        <p class="price">$200<span>/night</span></p>
      </div>

    </div>
  </section>

  <!-- <section class="box"></section> -->
</body>
</html>
